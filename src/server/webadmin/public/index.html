<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karnas Chronicles - Admin Panel</title>
  <link rel="stylesheet" href="/webadmin/style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <h2>Admin Panel</h2>
      <p class="login-subtitle">Karnas Chronicles: Divided Dominion</p>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required>
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Main App (hidden until authenticated) -->
  <div id="app" class="app-layout" hidden>
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Admin Panel</h3>
      </div>
      <ul class="nav-links">
        <li><a href="#dashboard" class="nav-link active" data-section="dashboard">Dashboard</a></li>
        <li><a href="#players" class="nav-link" data-section="players">Players</a></li>
        <li><a href="#rooms" class="nav-link" data-section="rooms">Rooms</a></li>
        <li><a href="#monsters" class="nav-link" data-section="monsters">Monsters</a></li>
        <li><a href="#objects" class="nav-link" data-section="objects">Objects</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-secondary btn-block">Sign Out</button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="content" class="content">
      <div id="section-dashboard" class="section"></div>
      <div id="section-players" class="section" hidden></div>
      <div id="section-rooms" class="section" hidden></div>
      <div id="section-monsters" class="section" hidden></div>
      <div id="section-objects" class="section" hidden></div>
    </main>
  </div>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal" class="modal">
      <div class="modal-header">
        <h4 id="modal-title"></h4>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <!-- Delete Confirmation Dialog -->
  <div id="confirm-overlay" class="modal-overlay" hidden>
    <div class="modal modal-sm">
      <div class="modal-header">
        <h4 id="confirm-title">Confirm Deletion</h4>
        <button id="confirm-close" class="modal-close-btn">&times;</button>
      </div>
      <div id="confirm-body" class="modal-body">
        <p id="confirm-message">Are you sure you want to delete this record?</p>
      </div>
      <div class="modal-footer">
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Notification Area -->
  <div id="notifications" class="notifications"></div>

  <script src="/webadmin/app.js"></script>
</body>
</html>
