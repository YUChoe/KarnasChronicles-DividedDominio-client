<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karnas Chronicles: Divided Dominion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
      background-color: #1a1a1a;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 15px 20px;
      background-color: #1a1a1a;
      border-bottom: 1px solid #333333;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .header.compact {
      padding: 8px 20px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffffff;
      transition: all 0.3s ease;
    }

    .header.compact h1 {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .version-info {
      font-size: 0.7rem;
      color: #888888;
      display: flex;
      gap: 16px;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .header.compact .version-info {
      font-size: 0.6rem;
      gap: 12px;
    }

    .version-info span {
      display: inline-block;
    }

    .connection-controls {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      align-items: center;
      justify-content: center;
    }

    .connect-button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .connect-button:hover {
      background-color: #45a049;
    }

    .connect-button:active {
      background-color: #3d8b40;
    }

    .connect-button:disabled {
      background-color: #666666;
      cursor: not-allowed;
    }

    .connection-status {
      font-size: 0.75rem;
      color: #888888;
    }

    .connection-status.connected {
      color: #4CAF50;
    }

    .connection-status.connecting {
      color: #FFA500;
    }

    .connection-status.error {
      color: #ff4444;
    }

    .error-message {
      display: none;
      background-color: #ff4444;
      color: #ffffff;
      padding: 10px 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .error-message.visible {
      display: block;
    }

    .reconnect-button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 6px 12px;
      margin-top: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }

    .reconnect-button:hover {
      background-color: #45a049;
    }

    .reconnect-button:active {
      background-color: #3d8b40;
    }

    #terminal-container {
      flex: 1;
      background-color: #000000;
      border-top: 1px solid #333333;
      overflow: hidden;
      position: relative;
    }

    #terminal {
      width: 100%;
      height: 100%;
      padding: 10px;
    }

    #input-container {
      background-color: #2a2a2a;
      border-top: 1px solid #444444;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #command-input {
      flex: 1;
      padding: 10px 12px;
      background-color: #333333;
      border: 1px solid #555555;
      border-radius: 4px;
      color: #ffffff;
      font-family: 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      outline: none;
    }

    #command-input:focus {
      border-color: #777777;
      background-color: #3a3a3a;
    }

    #command-input::placeholder {
      color: #888888;
    }

    #send-button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    #send-button:hover {
      background-color: #45a049;
    }

    #send-button:active {
      background-color: #3d8b40;
    }

    #send-button:disabled {
      background-color: #666666;
      cursor: not-allowed;
    }

    /* 반응형 디자인 */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.4rem;
      }

      .header.compact h1 {
        font-size: 1rem;
      }

      .version-info {
        font-size: 0.6rem;
        gap: 8px;
      }

      .connection-controls {
        flex-direction: column;
        gap: 6px;
      }

      #input-container {
        padding: 10px 15px;
        gap: 8px;
      }

      #command-input {
        font-size: 16px; /* iOS에서 줌 방지 */
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="game-title">Karnas Chronicles: Divided Dominion</h1>
    <div class="version-info">
      <span id="client-version">Client: v1.0.0</span>
      <span id="server-version">Server: Not connected</span>
    </div>
    <div class="connection-controls">
      <button id="connect-btn" class="connect-button">Connect</button>
      <span id="connection-status" class="connection-status">Ready to connect</span>
    </div>
  </div>

  <div id="error-container" class="error-message">
    <div id="error-text"></div>
    <button id="reconnect-btn" class="reconnect-button">Reconnect</button>
  </div>

  <div id="terminal-container">
    <div id="terminal"></div>
  </div>

  <div id="input-container">
    <input type="text" id="command-input" placeholder="Enter command..." autocomplete="off" spellcheck="false">
    <button id="send-button">Send</button>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
